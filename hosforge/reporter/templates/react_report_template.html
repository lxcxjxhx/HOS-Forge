<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOS-Forge 安全扫描报告</title>

    <!-- CDN 依赖：零构建工具，AI IDE 生成后双击即可预览 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css" />

    <style>
        /* ===== HOS-Forge 安全风信子主题 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #161a22;
            --bg-card: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border: rgba(255,255,255,0.08);
            --critical: #B33F4E;
            --high: #D4A040;
            --medium: #8C6E9F;
            --low: #6CCB4C;
            --info: #6B6F72;
            --primary: #8C6E9F;
            --primary-light: #B49BC4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 24px;
            line-height: 1.6;
        }
        #root { max-width: 1400px; margin: 0 auto; }

        /* ===== 布局 ===== */
        .flex-row { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
        .flex-between { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* ===== Badge ===== */
        .badge {
            display:inline-block; padding:4px 10px; border-radius:12px;
            font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
        }
        .badge-critical { background:rgba(179,63,78,0.2); color:var(--critical); }
        .badge-high { background:rgba(212,160,64,0.2); color:var(--high); }
        .badge-medium { background:rgba(140,110,159,0.2); color:var(--medium); }
        .badge-low { background:rgba(108,203,76,0.2); color:var(--low); }
        .badge-info { background:rgba(107,111,114,0.2); color:var(--info); }
        .badge-confirmed { border:1px solid #22c55e; color:#22c55e; }
        .badge-uncertain { border:1px dashed #ffc107; color:#ffc107; }

        /* ===== Buttons ===== */
        .btn {
            background:var(--bg-card); border:1px solid var(--border);
            color:var(--text-secondary); padding:8px 16px; border-radius:6px;
            cursor:pointer; font-size:0.85rem; transition:all 0.2s;
        }
        .btn:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
        .btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
        .btn-selected { background:var(--primary); color:#fff; border-color:var(--primary); }

        /* ===== Input ===== */
        input, select {
            background:var(--bg-primary); border:1px solid var(--border);
            color:var(--text-primary); padding:8px 12px; border-radius:6px;
            font-size:0.9rem; outline:none;
        }
        input:focus, select:focus { border-color:var(--primary); }

        /* ===== 漏洞卡片 ===== */
        .vuln-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:8px; margin-bottom:12px; overflow:hidden; transition:all 0.2s;
        }
        .vuln-card:hover { border-color:var(--primary); }
        .vuln-card-header {
            padding:14px 18px; display:flex; align-items:center; gap:12px;
            cursor:pointer; user-select:none; flex-wrap:wrap;
            background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border);
        }
        .vuln-card-header .title { flex:1; font-weight:600; font-size:0.95rem; min-width:150px; }
        .vuln-card-header .location {
            font-family:monospace; font-size:0.75rem; color:var(--text-muted);
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:300px;
        }
        .vuln-card-body { padding:16px 18px; display:flex; flex-direction:column; gap:12px; }
        .vuln-card-body .desc { color:var(--text-secondary); font-size:0.9rem; }
        .vuln-card-body .evidence-item {
            padding:8px 12px; background:rgba(0,0,0,0.3); border-radius:4px;
            border-left:3px solid var(--primary); font-size:0.85rem; margin-top:4px;
        }
        .vuln-card-body .fix {
            background:rgba(108,203,76,0.08); border-left:3px solid var(--low);
            padding:10px 14px; border-radius:4px; font-size:0.9rem;
        }
        .vuln-card-body .status-select {
            margin-left:auto; background:var(--bg-primary); border:1px solid var(--border);
            color:var(--text-primary); padding:4px 8px; border-radius:4px; font-size:0.8rem;
        }
        .hljs { background:rgba(0,0,0,0.4) !important; border-radius:6px; padding:12px !important; font-size:0.8rem; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align:center; padding:60px 20px; color:var(--text-muted);
        }
        .empty-state .icon { font-size:3rem; margin-bottom:16px; }
        .empty-state h3 { color:var(--text-secondary); margin-bottom:8px; }

        /* ===== 分页 ===== */
        .pagination { display:flex; justify-content:center; gap:8px; margin-top:20px; }
        .pagination button {
            background:var(--bg-card); border:1px solid var(--border);
            color:var(--text-secondary); padding:6px 14px; border-radius:4px; cursor:pointer;
        }
        .pagination button.active { background:var(--primary); color:#fff; border-color:var(--primary); }
        .pagination button:disabled { opacity:0.4; cursor:not-allowed; }

        /* ===== 声明横幅 ===== */
        .disclaimer {
            background:linear-gradient(135deg, rgba(255,209,102,0.12), rgba(255,140,66,0.12));
            border:1px solid rgba(255,209,102,0.3); border-radius:8px;
            padding:14px 20px; margin-bottom:20px;
        }

        @media (max-width: 768px) {
            body { padding:12px; }
            .vuln-card-header { flex-direction:column; align-items:stretch; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- __HOS_REPORT_DATA_INJECT__ -->

    <script type="text/babel">
        /*
         * ================================================================
         * HOS-Forge React 安全报告模板
         * ================================================================
         * 专为 AI IDE 设计，零构建工具，CDN 加载 React。
         *
         * 【数据注入说明】
         * 扫描完成后，将真实报告数据赋值给 window.__HOS_REPORT_DATA__
         * 即可自动渲染完整报告。
         *
         * window.__HOS_REPORT_DATA__ = {
         *   summary: { totalFiles, totalVulnerabilities, scanDuration, severityCounts, overallFpr },
         *   vulnerabilities: [{ id, title, severity, category, status, confidence,
         *                       location, description, files, codeContext, evidence, fixSuggestion }],
         *   files: [{ path, issueCount, vulnIds }]
         * }
         * ================================================================
         */

        const { useState, useMemo, useReducer, useEffect, useRef } = React;

        /* ── 空状态初始数据（零 Mock，仅结构骨架） ───────────────── */
        const EMPTY_REPORT = {
            summary: {
                totalFiles: 0,
                totalVulnerabilities: 0,
                scanDuration: 0,
                severityCounts: { critical: 0, high: 0, medium: 0, low: 0, info: 0 },
                overallFpr: 0
            },
            vulnerabilities: [],
            files: []
        };

        /* ── 状态管理 ────────────────────────────────────────── */
        const initialState = {
            severityFilter: [],
            categoryFilter: [],
            searchQuery: '',
            viewMode: 'list',
            page: 1,
            pageSize: 20,
            vulnStatuses: {}
        };

        function appReducer(state, action) {
            switch (action.type) {
                case 'TOGGLE_SEVERITY': {
                    const s = state.severityFilter.includes(action.payload)
                        ? state.severityFilter.filter(v => v !== action.payload)
                        : [...state.severityFilter, action.payload];
                    return { ...state, severityFilter: s, page: 1 };
                }
                case 'TOGGLE_CATEGORY': {
                    const c = state.categoryFilter.includes(action.payload)
                        ? state.categoryFilter.filter(v => v !== action.payload)
                        : [...state.categoryFilter, action.payload];
                    return { ...state, categoryFilter: c, page: 1 };
                }
                case 'SET_SEARCH': return { ...state, searchQuery: action.payload, page: 1 };
                case 'SET_VIEW': return { ...state, viewMode: action.payload };
                case 'SET_PAGE': return { ...state, page: action.payload };
                case 'UPDATE_VULN_STATUS':
                    return {
                        ...state,
                        vulnStatuses: { ...state.vulnStatuses, [action.payload.id]: action.payload.status }
                    };
                case 'RESET_FILTERS':
                    return { ...state, severityFilter: [], categoryFilter: [], searchQuery: '', page: 1 };
                default: return state;
            }
        }

        /* ── 主应用 ──────────────────────────────────────────── */
        const App = () => {
            const [state, dispatch] = useReducer(appReducer, initialState);
            // 从 window.__HOS_REPORT_DATA__ 读取真实数据，无数据时显示空状态
            const [report] = useState(window.__HOS_REPORT_DATA__ || EMPTY_REPORT);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const hasData = report.vulnerabilities.length > 0;

            /* ── 筛选逻辑 ──────────────────────────────────── */
            const filteredVulns = useMemo(() => {
                return report.vulnerabilities.filter(v => {
                    if (state.severityFilter.length > 0 && !state.severityFilter.includes(v.severity)) return false;
                    if (state.categoryFilter.length > 0 && !state.categoryFilter.includes(v.category)) return false;
                    if (state.searchQuery) {
                        const q = state.searchQuery.toLowerCase();
                        if (!v.title.toLowerCase().includes(q) && !v.description.toLowerCase().includes(q)) return false;
                    }
                    return true;
                });
            }, [report.vulnerabilities, state.severityFilter, state.categoryFilter, state.searchQuery]);

            /* ── 分类统计（仅基于真实筛选结果） ─────────────── */
            const stats = useMemo(() => {
                const counts = { critical: 0, high: 0, medium: 0, low: 0, info: 0 };
                const statusCounts = { pending: 0, fixed: 0, ignored: 0, false_positive: 0 };
                filteredVulns.forEach(v => {
                    counts[v.severity] = (counts[v.severity] || 0) + 1;
                    const st = state.vulnStatuses[v.id] || 'pending';
                    statusCounts[st] = (statusCounts[st] || 0) + 1;
                });
                return { ...counts, ...statusCounts };
            }, [filteredVulns, state.vulnStatuses]);

            /* ── 分页 ─────────────────────────────────────── */
            const totalPages = Math.ceil(filteredVulns.length / state.pageSize);
            const paginatedVulns = useMemo(() => {
                const start = (state.page - 1) * state.pageSize;
                return filteredVulns.slice(start, start + state.pageSize);
            }, [filteredVulns, state.page, state.pageSize]);

            /* ── 图表 ─────────────────────────────────────── */
            useEffect(() => {
                if (!chartRef.current || !hasData) return;
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();

                const sevMap = { critical: '严重', high: '高', medium: '中', low: '低', info: '信息' };
                const data = Object.keys(sevMap).map(k => ({
                    label: sevMap[k],
                    value: stats[k] || 0,
                    color: `var(--${k})`
                }));

                if (data.some(d => d.value > 0)) {
                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.map(d => d.label),
                            datasets: [{
                                label: '漏洞数量',
                                data: data.map(d => d.value),
                                backgroundColor: data.map(d => `${d.color}66`),
                                borderColor: data.map(d => d.color),
                                borderWidth: 1
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } },
                                y: { grid: { display: false }, ticks: { color: '#e6edf3' } }
                            }
                        }
                    });
                }
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [stats, hasData]);

            /* ── 导出 CSV ─────────────────────────────────── */
            const exportCSV = () => {
                if (!hasData) return;
                const headers = ['ID', '标题', '严重级', '类别', '状态', '位置', '描述'];
                const rows = filteredVulns.map(v => [
                    v.id, v.title, v.severity, v.category,
                    state.vulnStatuses[v.id] || 'pending',
                    v.location, `"${v.description.replace(/"/g, '""')}"`
                ]);
                const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'hos_security_report.csv';
                link.click();
            };

            /* ── 搜索高亮 ─────────────────────────────────── */
            const highlightText = (text) => {
                if (!state.searchQuery || !text) return text;
                const regex = new RegExp(`(${state.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.split(regex).map((part, i) =>
                    regex.test(part)
                        ? <mark key={i} style={{ background: '#ffd16644', color: '#ffd166' }}>{part}</mark>
                        : part
                );
            };

            /* ── 漏洞卡片渲染 ─────────────────────────────── */
            const renderVulnCard = (vuln) => {
                const currentStatus = state.vulnStatuses[vuln.id] || 'pending';
                const [expanded, setExpanded] = useState(false);
                const codeRef = useRef(null);

                useEffect(() => {
                    if (expanded && codeRef.current && typeof hljs !== 'undefined') {
                        hljs.highlightElement(codeRef.current);
                    }
                }, [expanded]);

                return (
                    <div key={vuln.id} className="vuln-card" style={{ borderLeft: `4px solid var(--${vuln.severity})` }}>
                        <div className="vuln-card-header" onClick={() => setExpanded(!expanded)}>
                            <span className={`badge badge-${vuln.severity}`}>{vuln.severity.toUpperCase()}</span>
                            <span className={`badge badge-${vuln.status}`}>{vuln.status}</span>
                            <span className="title">{highlightText(vuln.title)}</span>
                            <span className="location">{vuln.location}</span>
                            <select className="status-select" value={currentStatus}
                                onChange={e => {
                                    e.stopPropagation();
                                    dispatch({ type: 'UPDATE_VULN_STATUS', payload: { id: vuln.id, status: e.target.value } });
                                }}
                                onClick={e => e.stopPropagation()}>
                                <option value="pending">待修复</option>
                                <option value="fixed">已修复</option>
                                <option value="ignored">忽略</option>
                                <option value="false_positive">误报</option>
                            </select>
                            <span style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>{expanded ? '▲' : '▼'}</span>
                        </div>

                        {expanded && (
                            <div className="vuln-card-body">
                                <div className="desc">{highlightText(vuln.description)}</div>

                                {vuln.codeContext && (
                                    <div>
                                        <div style={{ fontSize: '0.8rem', color: 'var(--text-secondary)', marginBottom: '4px' }}>
                                            {vuln.codeContext.file} (行 {vuln.codeContext.startLine}-{vuln.codeContext.endLine})
                                        </div>
                                        <pre style={{ margin: 0 }}>
                                            <code ref={codeRef} className="language-java">
                                                {vuln.codeContext.lines.join('\n')}
                                            </code>
                                        </pre>
                                    </div>
                                )}

                                {vuln.evidence && vuln.evidence.length > 0 && (
                                    <div>
                                        <div style={{ fontWeight: 600, fontSize: '0.85rem', color: 'var(--text-secondary)' }}>
                                            证据链</div>
                                        {vuln.evidence.map((ev, i) => (
                                            <div key={i} className="evidence-item">
                                                <div className="reason">{ev.reason}</div>
                                                <div className="loc">{ev.location}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {vuln.fixSuggestion && (
                                    <div className="fix">
                                        <strong>修复建议：</strong> {vuln.fixSuggestion}
                                    </div>
                                )}

                                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '4px' }}>
                                    置信度: {vuln.confidence ? `${(vuln.confidence * 100).toFixed(0)}%` : 'N/A'}
                                    {vuln.source ? ` | 来源: ${vuln.source}` : ''}
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            /* ── 空状态 ───────────────────────────────────── */
            const renderEmptyState = () => (
                <div className="empty-state">
                    <div className="icon">🔍</div>
                    <h3>暂无安全扫描数据</h3>
                    <p>请先执行安全扫描，或将报告数据注入到 window.__HOS_REPORT_DATA__</p>
                    <div style={{ marginTop: 16, textAlign: 'left', background: 'var(--bg-card)', padding: 16, borderRadius: 8, fontFamily: 'monospace', fontSize: '0.8rem', color: 'var(--text-muted)', whiteSpace: 'pre-wrap' }}>
{`// 数据注入示例：
window.__HOS_REPORT_DATA__ = {
  summary: {
    totalFiles: 150,
    totalVulnerabilities: 23,
    scanDuration: 845,
    severityCounts: {
      critical: 2, high: 5,
      medium: 10, low: 4, info: 2
    }
  },
  vulnerabilities: [
    {
      id: "VULN-001",
      title: "漏洞标题",
      severity: "high",
      category: "general_static",
      status: "confirmed",
      confidence: 0.85,
      location: "File.java:42",
      description: "漏洞描述",
      files: ["File.java"],
      codeContext: {
        file: "File.java",
        startLine: 38,
        endLine: 46,
        lines: ["line1", "line2"],
        vulnerableLines: [0]
      },
      evidence: [
        { type: "code", location: "File.java:42", reason: "检测到问题" }
      ],
      fixSuggestion: "修复建议"
    }
  ],
  files: [
    { path: "File.java", issueCount: 1, vulnIds: ["VULN-001"] }
  ]
};
// 刷新页面自动渲染`}
                    </div>
                </div>
            );

            /* ================================================================ */
            /*  主界面渲染                                                       */
            /* ================================================================ */
            if (!hasData) return renderEmptyState();

            // 提取分类列表（来自真实数据）
            const categories = [...new Set(report.vulnerabilities.map(v => v.category))];

            return (
                <div>
                    {/* ── 声明横幅 ── */}
                    <div className="disclaimer">
                        <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                            <span style={{ fontSize: '1.5rem' }}>⚠️</span>
                            <div>
                                <div style={{ fontWeight: 600, color: '#ffd166' }}>AI 扫描结果声明</div>
                                <div style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>
                                    本报告由 HOS-Forge 安全引擎生成。建议结合人工审查确认所有关键风险点。报告中所有数据均来自真实扫描结果，无任何模拟或占位数据。
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* ── 头部 ── */}
                    <header style={{ textAlign: 'center', marginBottom: 24 }}>
                        <h1 style={{
                            fontSize: '2rem', fontWeight: 700,
                            background: 'linear-gradient(135deg, var(--primary), var(--primary-light))',
                            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
                        }}>HOS-Forge 安全扫描报告</h1>
                        <p style={{ color: 'var(--text-secondary)' }}>AI 原生信息安全 IDE · 扫描结果报告</p>
                    </header>

                    {/* ── 状态栏 ── */}
                    <div className="card flex-between">
                        <span className={`badge ${report.summary.totalVulnerabilities > 0 ? 'badge-high' : 'badge-low'}`}
                            style={{ fontSize: '1rem', padding: '8px 20px' }}>
                            {report.summary.totalVulnerabilities > 0 ? `发现 ${report.summary.totalVulnerabilities} 个安全问题` : '未发现安全问题'}
                        </span>
                        <div style={{ display: 'flex', gap: 24, color: 'var(--text-secondary)', flexWrap: 'wrap' }}>
                            <span>扫描文件: <strong style={{ color: 'var(--text-primary)' }}>{report.summary.totalFiles}</strong></span>
                            <span>发现问题: <strong style={{ color: 'var(--text-primary)' }}>{filteredVulns.length}</strong></span>
                            <span>扫描用时: <strong style={{ color: 'var(--text-primary)' }}>{report.summary.scanDuration}s</strong></span>
                            <button className="btn btn-primary" onClick={exportCSV}>导出 CSV</button>
                        </div>
                    </div>

                    {/* ── 筛选工具栏 ── */}
                    <div className="card flex-row">
                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                            <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>严重级:</span>
                            {['critical', 'high', 'medium', 'low', 'info'].map(s => (
                                <button key={s}
                                    className={`btn ${state.severityFilter.includes(s) ? 'btn-selected' : ''}`}
                                    style={{ padding: '4px 12px', fontSize: '0.75rem' }}
                                    onClick={() => dispatch({ type: 'TOGGLE_SEVERITY', payload: s })}>
                                    {s}
                                </button>
                            ))}
                        </div>
                        {categories.length > 0 && (
                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
                                <span style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>类别:</span>
                                {categories.map(c => (
                                    <button key={c}
                                        className={`btn ${state.categoryFilter.includes(c) ? 'btn-selected' : ''}`}
                                        style={{ padding: '4px 12px', fontSize: '0.75rem' }}
                                        onClick={() => dispatch({ type: 'TOGGLE_CATEGORY', payload: c })}>
                                        {c.replace(/_/g, ' ')}
                                    </button>
                                ))}
                            </div>
                        )}
                        <input type="text" placeholder="搜索漏洞、文件..."
                            value={state.searchQuery}
                            onChange={e => dispatch({ type: 'SET_SEARCH', payload: e.target.value })}
                            style={{ flex: 1, minWidth: '180px' }} />
                        <button className="btn" onClick={() => dispatch({ type: 'RESET_FILTERS' })}>重置</button>
                        <button className="btn"
                            onClick={() => dispatch({ type: 'SET_VIEW', payload: state.viewMode === 'list' ? 'relation' : 'list' })}>
                            {state.viewMode === 'list' ? '关系视图' : '列表视图'}
                        </button>
                    </div>

                    {/* ── 统计 + 图表 ── */}
                    <div className="card" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
                        <div>
                            <h3 style={{ fontSize: '1rem', marginBottom: 12 }}>漏洞统计</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
                                {['critical', 'high', 'medium', 'low', 'info'].map(k => (
                                    <div key={k} style={{
                                        display: 'flex', justifyContent: 'space-between',
                                        padding: '4px 0', borderBottom: '1px solid var(--border)'
                                    }}>
                                        <span style={{ color: 'var(--text-secondary)' }}>{k.toUpperCase()}</span>
                                        <span style={{ fontWeight: 700, color: `var(--${k})` }}>{stats[k] || 0}</span>
                                    </div>
                                ))}
                            </div>
                            <div style={{ marginTop: 12, display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                                <span style={{ color: 'var(--text-secondary)' }}>待修复: <strong>{stats.pending || 0}</strong></span>
                                <span style={{ color: 'var(--low)' }}>已修复: <strong>{stats.fixed || 0}</strong></span>
                                <span style={{ color: 'var(--text-muted)' }}>误报: <strong>{stats.false_positive || 0}</strong></span>
                            </div>
                        </div>
                        <div>
                            <h3 style={{ fontSize: '1rem', marginBottom: 12 }}>漏洞分布</h3>
                            <div style={{ height: '180px' }}>
                                <canvas ref={chartRef}></canvas>
                                {!stats.critical && !stats.high && !stats.medium && !stats.low && !stats.info && (
                                    <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-muted)' }}>
                                        暂无统计数据
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* ── 漏洞列表 / 关系视图 ── */}
                    <h2 style={{
                        fontSize: '1.3rem', margin: '24px 0 16px',
                        borderBottom: '2px solid var(--primary)', paddingBottom: 8
                    }}>
                        漏洞详情 ({filteredVulns.length})
                    </h2>

                    {state.viewMode === 'list' ? (
                        <>
                            {paginatedVulns.map(v => renderVulnCard(v))}

                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button onClick={() => dispatch({ type: 'SET_PAGE', payload: Math.max(1, state.page - 1) })}
                                        disabled={state.page === 1}>◀</button>
                                    {Array.from({ length: Math.min(5, totalPages) }, (_, i) => {
                                        let p = state.page;
                                        if (totalPages <= 5) p = i + 1;
                                        else if (state.page <= 3) p = i + 1;
                                        else if (state.page >= totalPages - 2) p = totalPages - 4 + i;
                                        else p = state.page - 2 + i;
                                        return (
                                            <button key={p} className={p === state.page ? 'active' : ''}
                                                onClick={() => dispatch({ type: 'SET_PAGE', payload: p })}>{p}</button>
                                        );
                                    })}
                                    <button onClick={() => dispatch({ type: 'SET_PAGE', payload: Math.min(totalPages, state.page + 1) })}
                                        disabled={state.page === totalPages}>▶</button>
                                </div>
                            )}
                        </>
                    ) : (
                        /* ── 关系视图 ── */
                        <div className="card">
                            <h3 style={{ marginBottom: 12 }}>漏洞 - 文件关联</h3>
                            <div style={{ overflowX: 'auto' }}>
                                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.9rem' }}>
                                    <thead>
                                        <tr style={{ borderBottom: '2px solid var(--border)' }}>
                                            <th style={{ textAlign: 'left', padding: '8px 12px', color: 'var(--text-secondary)' }}>漏洞</th>
                                            <th style={{ textAlign: 'left', padding: '8px 12px', color: 'var(--text-secondary)' }}>严重级</th>
                                            <th style={{ textAlign: 'left', padding: '8px 12px', color: 'var(--text-secondary)' }}>关联文件</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredVulns.slice(0, 30).map(v => (
                                            <tr key={v.id} style={{ borderBottom: '1px solid var(--border)' }}>
                                                <td style={{ padding: '8px 12px' }}>{v.title}</td>
                                                <td style={{ padding: '8px 12px' }}>
                                                    <span className={`badge badge-${v.severity}`}>{v.severity}</span>
                                                </td>
                                                <td style={{ padding: '8px 12px', fontFamily: 'monospace', fontSize: '0.8rem' }}>
                                                    {(v.files || [v.location]).join(', ')}
                                                </td>
                                            </tr>
                                        ))}
                                        {filteredVulns.length > 30 && (
                                            <tr>
                                                <td colSpan="3" style={{ textAlign: 'center', padding: 12, color: 'var(--text-muted)' }}>
                                                    仅显示前 30 条，切换列表视图查看全部
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        /* ── 挂载 ──────────────────────────────────────────── */
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
