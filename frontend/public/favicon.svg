<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="petal1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#B49BC4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#8C6E9F"/>
      <stop offset="70%" stop-color="#862C3B"/>
      <stop offset="100%" stop-color="#2D1A36"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B49BC4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D1A36" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 外发光 -->
  <circle cx="16" cy="16" r="16" fill="url(#glow)"/>
  <!-- 花瓣簇 -->
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(45 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(135 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(225 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(270 16 16)"/>
  <ellipse cx="16" cy="11" rx="3" ry="5" fill="url(#petal1)" transform="rotate(315 16 16)"/>
  <!-- 花心 -->
  <circle cx="16" cy="16" r="3" fill="#6CCB4C"/>
  <circle cx="16" cy="16" r="1.5" fill="#B33F4E"/>
</svg>
